<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreUp | History</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><i class="fas fa-brain-circuit"></i><span>ScoreUp</span></div>
            <nav id="main-nav">
                <ul>
                    <li><a href="index.html" class="nav-link">Practice</a></li>
                    <li><a href="history.html" class="nav-link active">History</a></li>
                    <li><a href="dashboard.html" class="nav-link">Stats</a></li>
                    <li><a href="login.html" class="login-btn">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="user-greeting">
            <h2>Your Learning Journey</h2>
            <p style="color: var(--text-dim); text-align: center;">Review every challenge you've conquered.</p>
        </div>
        
        <div id="historyList" class="history-container">
            <!-- Cards will be injected here -->
        </div>
    </main>

    <div id="historyDetailModal" class="modal hidden">
        <div class="modal-content glass-card">
            <span class="close-button">&times;</span>
            <div id="modalContent"></div>
            <button id="retryQuestionBtn" class="primary-btn" style="background: var(--accent);">Retry Question</button>
        </div>
    </div>

    <script src="static/storage-util.js"></script>
    <script src="static/history-script.js"></script>
</body>
</html>
